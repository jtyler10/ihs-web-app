version: "3.8"
services:
  db:
    image: mysql:8.0
    container_name: ihs-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: ihs_db
      MYSQL_USER: ihs_user
      MYSQL_PASSWORD: ihs_pass
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - db_data:/var/lib/mysql

  adminer:
    image: adminer:latest
    container_name: ihs-adminer
    ports:
      - "8080:8080"
    depends_on:
      - db

volumes:
  db_data: